amcl:
  ros__parameters:
    use_sim_time: false
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.05
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      max_vel_x: 0.30
      min_vel_x: 0.00
      max_vel_theta: 1.00
      acc_lim_x: 2.50
      decel_lim_x: -2.50
      acc_lim_theta: 3.20
      decel_lim_theta: -3.20
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      observation_sources: scan
      scan:
        topic: /scan_filtered
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_footprint
      observation_sources: scan
      scan:
        topic: /scan_filtered
map_server:
  ros__parameters:
    use_sim_time: false
planner_server:
  ros__parameters:
    use_sim_time: false
recoveries_server:
  ros__parameters:
    use_sim_time: false
waypoint_follower:
  ros__parameters:
    use_sim_time: false
